<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title></title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1></h1>
    <button id="theme-button">🌑</button>
  </header>

  <section class="my-section" id="breed-section">
    <h2>Random dog by breed</h2>
    <select name="breed" id="breed">
      <option value="husky">Husky</option>
      <option value="kombai">Kombai Breed</option>
      <option value="mix">Mix</option>
    </select>
  </section>

  <section id="hero" class="my-section">
    <h2></h2>
    <div id="hero-images">
    </div>
  </section>

  <section id="suggest-dog" class="my-section gray">
    <h2>Suggest a dog</h2>
    <form id="dog-form">
      <div>
        <label for="dog-name">Dog Name</label>
        <input type="text" id="dog-name">
      </div>
      <div>
        <label for="dog-image">Dog Image</label>
        <input type="text" id="dog-image">
      </div>
      <div>
        <input type="submit" value="Send suggest">
      </div>
    </form>
  </section>

  <section id="my-dog" class="my-section">
    <input id="your-dog" placeholder="Your dog name">
    <h3 id="best-dog"></h3>
  </section>

  <button id="console-button">C</button>

  <script src="script.js"></script>
  <script src="load-content.js"></script>
  <script src="dog-api.js"></script>
</body>

</html>
